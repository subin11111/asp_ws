asp_final_ugv_path_follower:
  ros__parameters:
    mission1_path: mission1_carrier.csv
    rendezvous_path: mission3_rendezvous.csv
    map_frame: "map"
    base_frame: "X1_asp/base_link"
    cmd_vel_topic: "/asp_final/ugv/cmd_vel"
    control_period_s: 0.1
    final_tolerance_m: 1.2
    angular_kp: 2.8
    curvature_gain: 3.0
    heading_slowdown_gain: 1.4

    # Mission1: UAV carrier mode
    mission1_carrier_mode: true
    mission1_cruise_speed: 2.7
    mission1_max_linear_speed: 2.7
    mission1_min_linear_speed: 2.7
    mission1_max_angular_speed: 2.8
    mission1_max_linear_accel: 3.5
    mission1_max_angular_accel: 3.0
    mission1_lookahead_distance: 2.0
    mission1_waypoint_tolerance: 1.0
    mission1_slow_down_distance: 3.0
    mission1_final_slowdown_enabled: true
    mission1_final_slow_down_distance: 10.0
    mission1_final_min_linear_speed: 0.8
    mission1_final_respect_csv_target_speed: false
    mission1_finish_decel_enabled: true
    mission1_finish_decel_stop_threshold: 0.05
    mission1_heading_slowdown_enabled: true
    mission1_heading_slowdown_cos_threshold: 0.65
    mission1_corner_slowdown_enabled: true
    mission1_corner_slowdown_speed: 0.5

    # Mission3: senior-style rendezvous mode
    mission3_cruise_speed: 3.0
    mission3_max_linear_speed: 3.5
    mission3_min_linear_speed: 0.35
    mission3_max_angular_speed: 2.2
    mission3_max_linear_accel: 1.8
    mission3_max_angular_accel: 1.6
    mission3_initial_cruise_speed: 1.6
    mission3_initial_max_linear_speed: 2.0
    mission3_initial_max_linear_accel: 1.0
    mission3_boost_after_sec: 5.0
    mission3_lookahead_distance: 3.5
    mission3_waypoint_tolerance: 1.2
    mission3_slow_down_distance: 2.0
    mission3_start_delay_sec: 3.0
    rendezvous_goal_x: .nan
    rendezvous_goal_y: .nan
    rendezvous_goal_target_speed: .nan
