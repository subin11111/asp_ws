asp_final_ugv_path_follower:
  ros__parameters:
    mission1_path: mission1_carrier.csv
    rendezvous_path: mission3_rendezvous.csv
    map_frame: "map"
    base_frame: "X1_asp/base_link"
    cmd_vel_topic: "/asp_final/ugv/cmd_vel"
    control_period_s: 0.1
    final_tolerance_m: 1.2
    angular_kp: 2.8
    curvature_gain: 3.0
    heading_slowdown_gain: 1.4

    # Mission1: UAV carrier mode
    mission1_carrier_mode: true
    mission1_cruise_speed: 1.0
    mission1_max_linear_speed: 1.8
    mission1_min_linear_speed: 1.8
    mission1_max_angular_speed: 1.8
    mission1_max_linear_accel: 1.8
    mission1_max_angular_accel: 1.8
    mission1_lookahead_distance: 2.0
    mission1_waypoint_tolerance: 1.0
    mission1_slow_down_distance: 3.0
    mission1_heading_slowdown_enabled: true
    mission1_heading_slowdown_cos_threshold: 0.65
    mission1_corner_slowdown_enabled: true
    mission1_corner_slowdown_speed: 0.5

    # Mission3: faster rendezvous mode
    mission3_cruise_speed: 2.0
    mission3_max_linear_speed: 2.5
    mission3_min_linear_speed: 2.5
    mission3_max_angular_speed: 2.5
    mission3_max_linear_accel: 2.5
    mission3_max_angular_accel: 2.5
    mission3_lookahead_distance: 3.5
    mission3_waypoint_tolerance: 1.2
    mission3_slow_down_distance: 2.0
